version: '3.8'

services:
  churn-prediction:
    build: .
    container_name: customer-churn-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./streamlit_app.py:/app/streamlit_app.py
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    command: streamlit run streamlit_app.py
    networks:
      - churn-network

networks:
  churn-network:
    driver: bridge
